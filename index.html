<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SRPG — 오리지널 전술 RPG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0d0d1a;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #game-container { width: 100%; height: 100%; }
    canvas { display: block; }

    /* ══════════════════════════════════════
       Auth 모달 오버레이
    ══════════════════════════════════════ */
    #auth-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(8, 8, 20, 0.94);
      backdrop-filter: blur(8px);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }
    #auth-overlay.visible { display: flex; }

    #auth-modal {
      background: #13192e;
      border: 1.5px solid #2a3a6e;
      border-radius: 20px;
      padding: 40px 36px 32px;
      width: 360px;
      font-family: Arial, sans-serif;
    }

    /* 탭 전환 */
    #auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border-bottom: 1.5px solid #2a3a6e;
    }
    .auth-tab {
      flex: 1;
      padding: 10px 0;
      background: none;
      border: none;
      color: rgba(255,255,255,0.35);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: color 0.15s;
      letter-spacing: 0.05em;
    }
    .auth-tab.active {
      color: #f1c40f;
      border-bottom: 2px solid #f1c40f;
      margin-bottom: -1.5px;
    }

    /* 폼 공통 */
    .auth-form { display: none; flex-direction: column; gap: 12px; }
    .auth-form.active { display: flex; }

    .auth-form h2 {
      font-size: 22px; font-weight: 900;
      color: #fff; margin-bottom: 4px;
      letter-spacing: -0.02em;
    }
    .auth-form p.sub {
      font-size: 13px; color: rgba(255,255,255,0.4);
      margin-bottom: 8px; line-height: 1.5;
    }

    .auth-input {
      width: 100%; padding: 11px 14px;
      background: #0d1220;
      border: 1.5px solid #2a3a6e;
      border-radius: 10px;
      color: #fff; font-size: 14px;
      outline: none; transition: border-color 0.15s;
    }
    .auth-input:focus { border-color: #3498db; }
    .auth-input::placeholder { color: rgba(255,255,255,0.25); }

    .auth-submit {
      width: 100%; padding: 12px 0;
      background: #3498db; color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 800;
      cursor: pointer; transition: background 0.15s;
      margin-top: 4px;
    }
    .auth-submit:hover { background: #2980b9; }
    .auth-submit:active { background: #1f6ea8; }

    .auth-err {
      font-size: 12px; color: #e74c3c;
      min-height: 16px; text-align: center;
    }
    .auth-ok {
      font-size: 12px; color: #2ecc71;
      min-height: 16px; text-align: center;
    }

    /* 구분선 */
    .auth-divider {
      display: flex; align-items: center; gap: 10px;
      color: rgba(255,255,255,0.2); font-size: 12px;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1;
      height: 1px; background: #2a3a6e;
    }

    /* OAuth 버튼 */
    .oauth-row { display: flex; gap: 10px; }
    .oauth-btn {
      flex: 1; display: flex;
      align-items: center; justify-content: center; gap: 8px;
      padding: 10px 0; border-radius: 10px; border: none;
      font-size: 13px; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s;
    }
    .oauth-btn:hover { opacity: 0.82; }
    .oauth-btn.google { background: #fff; color: #333; }
    .oauth-btn.github { background: #24292e; color: #fff; }

    /* 스킵 */
    .auth-skip {
      text-align: center; margin-top: 8px;
      font-size: 12px; color: rgba(255,255,255,0.25);
      cursor: pointer; text-decoration: underline;
    }
    .auth-skip:hover { color: rgba(255,255,255,0.5); }

    /* ══════════════════════════════════════
       유저 정보 바 (우상단)
    ══════════════════════════════════════ */
    #user-bar {
      display: none;
      position: fixed; top: 10px; right: 14px;
      z-index: 190;
      align-items: center; gap: 10px;
      background: rgba(19,25,46,0.9);
      border: 1px solid #2a3a6e;
      border-radius: 20px;
      padding: 5px 14px;
      font-family: Arial, sans-serif;
    }
    #user-bar.visible { display: flex; }
    #user-name { font-size: 13px; color: rgba(255,255,255,0.8); }
    #btn-logout {
      font-size: 12px; color: rgba(255,255,255,0.35);
      background: none; border: none; cursor: pointer;
    }
    #btn-logout:hover { color: #e74c3c; }

    /* ══════════════════════════════════════
       세이브/로드 모달
    ══════════════════════════════════════ */
    #save-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(8,8,20,0.88);
      backdrop-filter: blur(6px);
      z-index: 150;
      justify-content: center;
      align-items: center;
    }
    #save-overlay.visible { display: flex; }

    #save-modal {
      background: #13192e;
      border: 1.5px solid #2a3a6e;
      border-radius: 20px;
      padding: 32px 30px;
      width: 420px;
      font-family: Arial, sans-serif;
    }
    #save-modal h2 {
      font-size: 20px; font-weight: 900;
      color: #f1c40f; margin-bottom: 6px;
      letter-spacing: 0.04em;
    }
    #save-modal .save-mode-label {
      font-size: 12px; color: rgba(255,255,255,0.35);
      margin-bottom: 20px;
    }

    .slot-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

    .slot-card {
      display: flex; align-items: center;
      background: #0d1220;
      border: 1.5px solid #2a3a6e;
      border-radius: 12px;
      padding: 14px 16px;
      gap: 14px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .slot-card:hover { background: #1a2540; border-color: #3498db; }
    .slot-card.empty .slot-info { color: rgba(255,255,255,0.25); }

    .slot-num {
      font-size: 22px; font-weight: 900;
      color: #3498db; min-width: 32px; text-align: center;
    }
    .slot-info { flex: 1; }
    .slot-title {
      font-size: 14px; font-weight: 700;
      color: #fff; margin-bottom: 3px;
    }
    .slot-meta { font-size: 11px; color: rgba(255,255,255,0.4); }

    .slot-del {
      font-size: 12px; color: rgba(255,255,255,0.2);
      background: none; border: none; cursor: pointer;
      padding: 4px 8px; border-radius: 6px;
    }
    .slot-del:hover { color: #e74c3c; background: rgba(231,76,60,0.12); }

    #save-close {
      width: 100%; padding: 11px 0;
      background: #1e2a46; color: rgba(255,255,255,0.5);
      border: none; border-radius: 10px;
      font-size: 14px; cursor: pointer;
    }
    #save-close:hover { background: #253355; }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <!-- ══ Auth 오버레이 ══ -->
  <div id="auth-overlay">
    <div id="auth-modal">
      <!-- 탭 -->
      <div id="auth-tabs">
        <button class="auth-tab active" data-tab="login">로그인</button>
        <button class="auth-tab" data-tab="signup">회원가입</button>
      </div>

      <!-- 로그인 폼 -->
      <div class="auth-form active" id="form-login">
        <h2>다시 오셨군요!</h2>
        <p class="sub">로그인하면 진행도와 캐릭터 레벨이<br>자동으로 저장·복원됩니다.</p>
        <input class="auth-input" id="login-email"    type="email"    placeholder="이메일" autocomplete="email" />
        <input class="auth-input" id="login-password" type="password" placeholder="비밀번호" autocomplete="current-password" />
        <div class="auth-err" id="login-err"></div>
        <button class="auth-submit" id="btn-login">로그인</button>
        <div class="auth-divider">또는</div>
        <div class="oauth-row">
          <button class="oauth-btn google" id="btn-google">
            <svg width="16" height="16" viewBox="0 0 18 18">
              <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z"/>
              <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z"/>
              <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332Z"/>
              <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58Z"/>
            </svg>
            Google
          </button>
          <button class="oauth-btn github" id="btn-github">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
              <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
            </svg>
            GitHub
          </button>
        </div>
        <div class="auth-skip" id="btn-skip">로그인 없이 플레이 (저장 안 됨)</div>
      </div>

      <!-- 회원가입 폼 -->
      <div class="auth-form" id="form-signup">
        <h2>처음이시군요!</h2>
        <p class="sub">닉네임과 이메일로 계정을 만들어<br>진행도를 영구 저장하세요.</p>
        <input class="auth-input" id="signup-username" type="text"     placeholder="닉네임 (2~12자)" maxlength="12" />
        <input class="auth-input" id="signup-email"    type="email"    placeholder="이메일" autocomplete="email" />
        <input class="auth-input" id="signup-password" type="password" placeholder="비밀번호 (8자 이상)" autocomplete="new-password" />
        <div class="auth-err" id="signup-err"></div>
        <div class="auth-ok"  id="signup-ok"></div>
        <button class="auth-submit" id="btn-signup">회원가입</button>
      </div>
    </div>
  </div>

  <!-- ══ 유저 정보 바 ══ -->
  <div id="user-bar">
    <span id="user-name"></span>
    <button id="btn-logout">로그아웃</button>
  </div>

  <!-- ══ 세이브/로드 모달 ══ -->
  <div id="save-overlay">
    <div id="save-modal">
      <h2 id="save-title">저장하기</h2>
      <div class="save-mode-label" id="save-mode-label">저장할 슬롯을 선택하세요</div>
      <div class="slot-list" id="slot-list">
        <!-- JS로 동적 생성 -->
      </div>
      <button id="save-close">닫기</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>

  <!-- Auth / Save 모달 DOM 제어 스크립트 -->
  <script type="module">
    import { authSystem } from '/src/systems/AuthSystem.js';
    import { saveSystem  } from '/src/systems/SaveSystem.js';

    // ── 탭 전환 ──
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`form-${tab.dataset.tab}`).classList.add('active');
        document.getElementById('login-err').textContent  = '';
        document.getElementById('signup-err').textContent = '';
        document.getElementById('signup-ok').textContent  = '';
      });
    });

    // ── 로그인 ──
    document.getElementById('btn-login').addEventListener('click', async () => {
      const email = document.getElementById('login-email').value.trim();
      const pw    = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-err');
      errEl.textContent = '';
      if (!email || !pw) { errEl.textContent = '이메일과 비밀번호를 입력하세요.'; return; }
      const res = await authSystem.signInWithEmail(email, pw);
      if (!res.ok) { errEl.textContent = _translateError(res.error); }
    });

    // Enter 키 로그인
    ['login-email','login-password'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('btn-login').click();
      });
    });

    // ── 회원가입 ──
    document.getElementById('btn-signup').addEventListener('click', async () => {
      const username = document.getElementById('signup-username').value.trim();
      const email    = document.getElementById('signup-email').value.trim();
      const pw       = document.getElementById('signup-password').value;
      const errEl    = document.getElementById('signup-err');
      const okEl     = document.getElementById('signup-ok');
      errEl.textContent = ''; okEl.textContent = '';

      if (username.length < 2)  { errEl.textContent = '닉네임은 2자 이상 입력하세요.'; return; }
      if (!email)                { errEl.textContent = '이메일을 입력하세요.'; return; }
      if (pw.length < 8)         { errEl.textContent = '비밀번호는 8자 이상이어야 합니다.'; return; }

      const res = await authSystem.signUp(email, pw, username);
      if (!res.ok) { errEl.textContent = _translateError(res.error); return; }
      if (res.needsConfirm) {
        okEl.textContent = '인증 이메일을 보냈습니다. 메일함을 확인하세요!';
      } else {
        okEl.textContent = '가입 완료! 자동 로그인됩니다.';
      }
    });

    // ── OAuth ──
    document.getElementById('btn-google').addEventListener('click', () => authSystem.signIn('google'));
    document.getElementById('btn-github').addEventListener('click', () => authSystem.signIn('github'));
    document.getElementById('btn-skip').addEventListener('click',
      () => document.getElementById('auth-overlay').classList.remove('visible'));

    // ── 로그아웃 ──
    document.getElementById('btn-logout').addEventListener('click', () => authSystem.signOut());

    // ── 세이브 모달 닫기 ──
    document.getElementById('save-close').addEventListener('click', () => {
      document.getElementById('save-overlay').classList.remove('visible');
    });

    // ── 오류 메시지 한글화 ──
    function _translateError(msg) {
      if (!msg) return '알 수 없는 오류';
      if (msg.includes('Invalid login'))     return '이메일 또는 비밀번호가 올바르지 않습니다.';
      if (msg.includes('already registered')) return '이미 가입된 이메일입니다.';
      if (msg.includes('Password'))          return '비밀번호는 8자 이상이어야 합니다.';
      if (msg.includes('rate limit'))        return '잠시 후 다시 시도하세요.';
      return msg;
    }

    // ── 전역 노출 (Phaser Scene에서 모달 열기용) ──
    window.openSaveModal  = openSaveModal;
    window.openAuthModal  = () => document.getElementById('auth-overlay').classList.add('visible');

    async function openSaveModal(mode = 'save', onSelect) {
      const modal    = document.getElementById('save-overlay');
      const titleEl  = document.getElementById('save-title');
      const labelEl  = document.getElementById('save-mode-label');
      const listEl   = document.getElementById('slot-list');

      titleEl.textContent = mode === 'save' ? '저장하기' : '불러오기';
      labelEl.textContent = mode === 'save' ? '저장할 슬롯을 선택하세요' : '불러올 슬롯을 선택하세요';
      listEl.innerHTML    = '<div style="color:rgba(255,255,255,0.3);text-align:center;padding:20px">불러오는 중...</div>';
      modal.classList.add('visible');

      const slots = await saveSystem.loadAll();

      listEl.innerHTML = '';
      slots.forEach(slot => {
        const card = document.createElement('div');
        card.className = `slot-card${slot.empty ? ' empty' : ''}`;

        const cleared = slot.stageProgress
          ? Object.values(slot.stageProgress).filter(v => v?.cleared).length
          : 0;
        const time = slot.playTimeSec ? saveSystem.formatPlayTime(slot.playTimeSec) : '--:--:--';
        const updated = slot.updatedAt
          ? new Date(slot.updatedAt).toLocaleDateString('ko-KR')
          : '';

        card.innerHTML = `
          <div class="slot-num">${slot.slot}</div>
          <div class="slot-info">
            <div class="slot-title">${slot.empty ? '빈 슬롯' : `클리어 ${cleared}스테이지`}</div>
            <div class="slot-meta">${slot.empty ? '새 게임 시작' : `플레이 ${time}  ·  ${updated}`}</div>
          </div>
          ${!slot.empty ? `<button class="slot-del" data-slot="${slot.slot}">삭제</button>` : ''}
        `;

        card.addEventListener('click', async (e) => {
          if (e.target.classList.contains('slot-del')) return;
          modal.classList.remove('visible');
          if (onSelect) await onSelect(slot.slot, slot);
        });

        const delBtn = card.querySelector('.slot-del');
        if (delBtn) {
          delBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (!confirm(`슬롯 ${slot.slot}을 삭제하시겠습니까?`)) return;
            await saveSystem.delete(slot.slot);
            openSaveModal(mode, onSelect);
          });
        }

        listEl.appendChild(card);
      });
    }
  </script>
</body>
</html>
