<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SRPG — 오리지널 전술 RPG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a2e;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #game-container { width: 100%; height: 100%; }
    canvas { display: block; }

    /* ── Auth 오버레이 ── */
    #auth-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 26, 0.93);
      backdrop-filter: blur(6px);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    #auth-overlay.visible { display: flex; }

    #auth-modal {
      background: #16213e;
      border: 1.5px solid #2a3a6e;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      min-width: 320px;
      max-width: 400px;
    }
    #auth-modal h1 {
      font-family: Arial, sans-serif;
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 0.1em;
      color: #f1c40f;
      margin-bottom: 8px;
    }
    #auth-modal p {
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .auth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 0;
      border-radius: 10px;
      border: none;
      font-family: Arial, sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-bottom: 12px;
    }
    .auth-btn:hover  { opacity: 0.85; }
    .auth-btn:active { opacity: 0.70; }
    #btn-google { background: #ffffff; color: #333; }
    #btn-github { background: #24292e; color: #fff; }
    #btn-skip {
      background: transparent;
      color: rgba(255,255,255,0.35);
      border: 1px solid rgba(255,255,255,0.15);
      margin-top: 4px;
    }

    /* ── 유저 정보 바 (우상단) ── */
    #user-bar {
      display: none;
      position: fixed;
      top: 12px;
      right: 16px;
      z-index: 90;
      align-items: center;
      gap: 10px;
      background: rgba(22,33,62,0.85);
      border: 1px solid #2a3a6e;
      border-radius: 20px;
      padding: 6px 14px;
    }
    #user-bar.visible { display: flex; }
    #user-name {
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.75);
    }
    #btn-logout {
      font-family: Arial, sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      background: none;
      border: none;
      cursor: pointer;
    }
    #btn-logout:hover { color: #e74c3c; }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <!-- Auth 오버레이 (OAuth 리다이렉트 처리를 위해 DOM 필수) -->
  <div id="auth-overlay">
    <div id="auth-modal">
      <h1>TACTICS</h1>
      <p>로그인하면 스테이지 진행도와<br>유닛 성장이 자동 저장됩니다</p>
      <button class="auth-btn" id="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z"/>
          <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332Z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58Z"/>
        </svg>
        Google로 시작하기
      </button>
      <button class="auth-btn" id="btn-github">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
          <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
        </svg>
        GitHub로 시작하기
      </button>
      <button class="auth-btn" id="btn-skip">로그인 없이 플레이 (저장 안 됨)</button>
    </div>
  </div>

  <!-- 유저 정보 바 -->
  <div id="user-bar">
    <span id="user-name"></span>
    <button id="btn-logout">로그아웃</button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
